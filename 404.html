<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found. Return to Becky Plank's homepage.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#1A6B72">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <title>Page Not Found | Becky Plank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #FAFAF7;
      color: #2D3436;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .error-container { max-width: 480px; }
    h1 {
      font-family: 'Lora', serif;
      font-size: 4rem;
      font-weight: 700;
      color: #1A6B72;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    h2 {
      font-family: 'Lora', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #1A6B72;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      background-color: #1A6B72;
      color: #fff;
      text-decoration: none;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }
    a:hover { background-color: #155a60; transform: translateY(-2px); }
    a:focus-visible { outline: 3px solid #D4A843; outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
